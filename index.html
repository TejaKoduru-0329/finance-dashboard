<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Finance Dashboard</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

        <!-- CSS File -->
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container-fluid">

            <div class="row">

                <div class="col-md-2 neo-card p-3 vh-100 d-flex flex-column position-fixed">

                    <h4 class="gradient-text fin-flow">FinFlow</h4>
                    <hr class="divider-line">

                    <ul class="nav flex-column" id="menu">
                        <li class="nav-item mb-3 active" data-page="dashboard">📊 Dashboard</li>
                        <li class="nav-item mb-3" data-page="transactions">💳 Transactions</li>
                        <li class="nav-item" data-page="insights">💡 Insights</li>
                    </ul>

                    <!-- 🔥 Bottom Toggle -->
                    <div class="mt-auto">
                        <hr class="divider-line">
                        <p>Role</p>
                        <div class="role-toggle">
                            <button id="adminBtn" class="active">Admin</button>
                            <button id="viewerBtn">Viewer</button>
                        </div>
                    </div>

                </div>
                
                <!-- Main Content -->
                <div class="col-md-10 p-4 main-content">

                    <!-- Top Bar -->
                    <div class="d-flex justify-content-between mb-4">
                        <h3 id="pageTitle" class="gradient-text">Dashboard</h3>

                        <div class="d-flex gap-3">
                            <button class="neo-btn px-3">All Time</button>
                            <span id="roleBadge" class="neo-btn px-3">ADMIN</span>
                        </div>
                    </div>

                    <!-- 🔹 Cards -->
                    <div class="row mb-4">

                        <div class="col-md-3">
                            <div class="neo-card">
                                <p>Total Balance</p>
                                <h4 id="balance">₹0</h4>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="neo-card">
                                <p>Total Income</p>
                                <h4 id="income">₹0</h4>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="neo-card">
                                <p>Total Expense</p>
                                <h4 id="expense">₹0</h4>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="neo-card">
                                <p>Savings Rate</p>
                                <h4 id="savings">0%</h4>
                            </div>
                        </div>

                    </div>

                    <!-- Charts -->
                    <div class="row mb-4">

                        <div class="col-md-8">
                            <div class="neo-card chart-card">
                                <h6>Balance Trend</h6>
                                <canvas id="lineChart"></canvas>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="neo-card chart-card">
                                <h6>Spending Breakdown</h6>
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>

                    </div>

                    <!-- Bar Chart -->
                    <div class="neo-card chart-card">
                        <h6>Monthly Income vs Expenses</h6>
                        <canvas id="barChart"></canvas>
                    </div>
                </div>
                

            </div>

        </div>

        <!-- Chart.js -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <!-- JS File -->
        <script src="script.js"></script>
    </body>
</html>
